<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>MovieDrift Admin</title>
<link rel="icon" href="img/logo.png" type="image/png">
<style>
:root { --bg:#000; --card-bg:#0a0a0a; --accent:#00ff66; --text:#eee; --muted:#777; }
body { background:var(--bg); color:var(--text); font-family:Arial,sans-serif; margin:0; }
header { background:#111; color:var(--accent); padding:15px 20px; font-size:24px; font-weight:bold; }
main { padding:20px; display:grid; grid-template-columns:320px 1fr; gap:20px; }
form { background:var(--card-bg); padding:15px; border-radius:8px; display:flex; flex-direction:column; gap:10px; border:1px solid #222; }
input, textarea, select, button { padding:8px; border:1px solid #333; border-radius:5px; background:#111; color:var(--text); }
input:focus { border-color:var(--accent); outline:none; }
button { background:var(--accent); color:#000; font-weight:bold; cursor:pointer; border:none; transition: 0.2s; }
button:hover { opacity:0.85; transform: translateY(-1px); }
button:disabled { background: #333; color: #777; cursor: not-allowed; }
table { width:100%; border-collapse:collapse; background:var(--card-bg); border-radius:8px; overflow:hidden; }
th, td { border-bottom:1px solid #222; padding:12px 8px; text-align:left; vertical-align:middle; }
th { color:var(--accent); background:#111; font-size: 0.9rem; }
tr:hover { background:#151515; }
.actions { display: flex; gap: 5px; }
.actions button { padding:6px 10px; border-radius:4px; font-size:0.75rem; }
.actions .edit { background:#00cc88; color:#000; }
.actions .delete { background:#e63946; color:#fff; }
.actions .episodes { background:#007bff; color:#fff; }
.actions .toggle { background: var(--accent); color: #000; }
/* M-Pesa Specific Style */
.actions .mpesa { background:#ea580c; color:#fff; } 
.search-bar { margin-bottom:15px; width:100%; padding: 12px; font-size: 1rem; }
.modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index:2000; }
.modal .modal-content { width:95%; max-width:1000px; max-height:90vh; overflow:auto; background:var(--card-bg); padding:20px; border-radius:8px; border: 1px solid var(--accent); }
.modal .close { float:right; cursor:pointer; color:var(--accent); font-size:24px; }
.status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; text-align: center; display: inline-block; min-width: 60px; }
.episode-row { display:flex; gap:12px; align-items:center; background: #111; padding: 10px; border-radius: 6px; margin-bottom: 8px; }
.episode-row img { width:100px; height:56px; object-fit:cover; border-radius:4px; }
.note { font-size:0.8rem; color:var(--muted); margin-top:4px; }
</style>
</head>
<body>
<header>🎬 MovieDrift Admin Dashboard</header>

<main>
  <aside>
    <form id="movieForm">
      <h3>🎬 Manage Media</h3>
      <input type="hidden" id="movieId">
      <input id="title" placeholder="Title" required>
      <input id="year" placeholder="Year (e.g. 2024)">
      <select id="type" required>
        <option value="Movie">Movie</option>
        <option value="Series">Series</option>
        <option value="Animation">Animation</option>
        <option value="Anime">Anime</option>
      </select>
      <input id="genres" placeholder="Genres (Action, Drama)">
      <input id="poster" placeholder="Poster URL">
      <input id="trailer" placeholder="Trailer URL">
      <input id="fileUrl" placeholder="Main Stream URL">
      <textarea id="description" placeholder="Description" rows="3"></textarea>
      <input id="rating" type="number" placeholder="Rating (0-10)" min="0" max="10" step="0.1">
      <div style="display:flex; gap:8px;">
        <button type="submit" style="flex:2;">Save Media</button>
        <button type="button" id="clearForm" style="flex:1; background:#444; color:#fff;">Clear</button>
      </div>
      <p class="note">Set Type to <strong>Series</strong> to enable episode lists.</p>
    </form>

    <form id="registerForm" style="margin-top:20px;">
      <h3>👥 Manage User</h3>
      <input type="hidden" id="regId">
      <input id="regEmail" placeholder="Email" type="email" required>
      <input id="regUsername" placeholder="Username" required>
      <input id="regPassword" type="password" placeholder="Password (min 6 chars)" required>
      <input id="regDevices" type="number" min="1" value="1" placeholder="Devices Allowed" required>
      <button type="submit" id="regSubmitBtn">Create User</button>
      <button type="button" id="clearUserForm" style="background:#444; color:#fff; display:none;">Cancel Edit</button>
    </form>
  </aside>

  <section>
    <div style="margin-bottom: 30px;">
      <h3>🎞 Media Library</h3>
      <input id="searchInput" class="search-bar" placeholder="🔍 Search library by title...">
      <button id="deleteSelectedBtn" onclick="deleteSelectedMovies()" disabled>🗑 Delete Selected</button>
      
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"></th>
            <th>Title</th>
            <th>Year</th>
            <th>Type</th>
            <th>Rating</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="movieTable"></tbody>
      </table>
    </div>

    <div>
      <h3>👥 User Management</h3>
      <table>
        <thead>
          <tr>
            <th>User Info</th>
            <th>Created</th>
            <th>Expiry</th>
            <th>Devs</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersTable"></tbody>
      </table>
    </div>
  </section>
</main>

<div id="episodesModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('episodesModal')">&times;</span>
    <h2 id="episodesModalTitle">Manage Episodes</h2>

    <form id="episodeForm">
      <input type="hidden" id="episodeId">
      <input type="hidden" id="episodeSeriesId">
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <select id="epSeason">
          <option value="1">Season 1</option>
          <option value="2">Season 2</option>
          <option value="3">Season 3</option>
        </select>
        <input id="newSeasonInput" placeholder="Or type New Season #">
      </div>
      <div style="display:grid; grid-template-columns: 100px 1fr; gap:10px;">
        <input id="epNumber" type="number" placeholder="Ep #">
        <input id="epTitle" placeholder="Episode Title">
      </div>
      <input id="epFileUrl" placeholder="Video Source URL">
      <input id="epPoster" placeholder="Episode Thumbnail URL">
      <textarea id="epDescription" placeholder="Episode Overview"></textarea>
      <button type="submit">Add/Update Episode</button>
    </form>

    <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
    <div id="episodesListContainer"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, getDoc,
  onSnapshot, query, where, orderBy 
} from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD2gkLs17Oa_dxIGu1FpOaDKAvGZwj_EFA",
  authDomain: "gamers-65b44.firebaseapp.com",
  projectId: "gamers-65b44",
  storageBucket: "gamers-65b44.firebasestorage.app",
  messagingSenderId: "97331968745",
  appId: "1:97331968745:web:a93ff0bd2c383800dcce78"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const moviesRef = collection(db, "movies");
const usersRef = collection(db, "users");

let allMovies = [];
let allUsers = [];
let selectedMovies = new Set();
let currentSeriesId = null;
let episodesUnsub = null;

// --- MPESA INTEGRATION START ---
window.triggerMpesaPayment = async (userId) => {
    const rawPhone = prompt("Enter M-Pesa Number (e.g., 0712345678):");
    if (!rawPhone) return;

    let phone = rawPhone.trim();
    if (phone.startsWith("0")) phone = "254" + phone.slice(1);
    if (phone.startsWith("+")) phone = phone.slice(1);
    if (phone.length !== 12) return alert("Invalid format. Use 2547XXXXXXXX");

    try {
        const response = await fetch("https://moviedrift-github-io.onrender.com/stk", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ phone, amount: 1, userId })
        });
        const res = await response.json();
        if(res.success) alert("STK Push sent! Enter PIN on your phone.");
        else alert("Error: " + res.error);
    } catch (e) {
        alert("Server is waking up. Please try again in 20 seconds.");
    }
};
// --- MPESA INTEGRATION END ---

/* 🎬 MEDIA ACTIONS */
onSnapshot(query(moviesRef, orderBy("createdAt", "desc")), snap => {
  allMovies = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderMovies(allMovies);
});

function renderMovies(list) {
  const tbody = document.getElementById("movieTable");
  tbody.innerHTML = list.map(m => `
    <tr>
      <td><input type="checkbox" onchange="toggleSelect('${m.id}')" ${selectedMovies.has(m.id) ? 'checked' : ''}></td>
      <td><strong>${m.title}</strong></td>
      <td>${m.year || '-'}</td>
      <td>${m.type}</td>
      <td>⭐ ${m.rating || '0'}</td>
      <td class="actions">
        <button class="edit" onclick="editMovie('${m.id}')">Edit</button>
        <button class="episodes" onclick="openEpisodes('${m.id}', '${m.title.replace(/'/g, "\\'")}')" ${m.type !== 'Series' ? 'disabled' : ''}>EPs</button>
        <button class="delete" onclick="deleteMovie('${m.id}')">Del</button>
      </td>
    </tr>
  `).join('');
  updateDeleteBtn();
}

window.editMovie = (id) => {
  const m = allMovies.find(x => x.id === id);
  if (!m) return;
  document.getElementById("movieId").value = m.id;
  document.getElementById("title").value = m.title;
  document.getElementById("year").value = m.year || "";
  document.getElementById("type").value = m.type;
  document.getElementById("genres").value = m.genres?.join(", ") || "";
  document.getElementById("poster").value = m.poster || "";
  document.getElementById("fileUrl").value = m.fileUrl || "";
  document.getElementById("description").value = m.description || "";
  document.getElementById("rating").value = m.rating || "";
  window.scrollTo({top:0, behavior:'smooth'});
};

document.getElementById("movieForm").onsubmit = async (e) => {
  e.preventDefault();
  const id = document.getElementById("movieId").value;
  const data = {
    title: document.getElementById("title").value.trim(),
    year: document.getElementById("year").value.trim(),
    type: document.getElementById("type").value,
    genres: document.getElementById("genres").value.split(",").map(g => g.trim()).filter(Boolean),
    poster: document.getElementById("poster").value,
    fileUrl: document.getElementById("fileUrl").value,
    description: document.getElementById("description").value,
    rating: parseFloat(document.getElementById("rating").value) || 0,
    updatedAt: Date.now()
  };

  if (id) {
    await updateDoc(doc(db, "movies", id), data);
    alert("Updated!");
  } else {
    data.createdAt = Date.now();
    await addDoc(moviesRef, data);
    alert("Added!");
  }
  e.target.reset();
  document.getElementById("movieId").value = "";
};

/* 👥 USER ACTIONS */
onSnapshot(query(usersRef, orderBy("createdAt", "desc")), snap => {
  allUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderUsers(allUsers);
});

async function renderUsers(list) {
  const tbody = document.getElementById("usersTable");
  tbody.innerHTML = list.map(u => {
    const isExpired = u.subscriptionExpiresAt ? Date.now() >= u.subscriptionExpiresAt : true;
    const status = (u.status === "Paid" && !isExpired) ? "Paid" : "Unpaid";
    const statusColor = status === "Paid" ? "#00ff66" : "#ff4444";

    return `
      <tr>
        <td><strong>${u.username}</strong><br><small>${u.email}</small></td>
        <td><small>${new Date(u.createdAt).toLocaleDateString()}</small></td>
        <td><small>${u.subscriptionExpiresAt ? new Date(u.subscriptionExpiresAt).toLocaleDateString() : 'Expired'}</small></td>
        <td>
          <input type="number" value="${u.devicesAllowed || 1}" style="width:40px" 
                 onchange="updateDevs('${u.id}', this.value)">
        </td>
        <td><span class="status-badge" style="color:${statusColor}; border:1px solid ${statusColor}">${status}</span></td>
        <td class="actions">
          <button class="edit" onclick="editUser('${u.id}')">Edit</button>
          <button class="mpesa" onclick="triggerMpesaPayment('${u.id}')">💸 Pay</button>
          <button class="toggle" onclick="toggleUserStatus('${u.id}', '${status}')">${status === 'Paid' ? 'Expire' : 'Activate'}</button>
          <button class="delete" onclick="deleteUser('${u.id}')">🗑</button>
        </td>
      </tr>
    `;
  }).join('');
}

window.editUser = (id) => {
  const u = allUsers.find(x => x.id === id);
  if (!u) return;
  document.getElementById("regId").value = u.id;
  document.getElementById("regEmail").value = u.email;
  document.getElementById("regUsername").value = u.username;
  document.getElementById("regPassword").value = u.password;
  document.getElementById("regDevices").value = u.devicesAllowed || 1;
  document.getElementById("regSubmitBtn").innerText = "Update User";
  document.getElementById("clearUserForm").style.display = "block";
  window.scrollTo({top: 0, behavior: 'smooth'});
};

document.getElementById("clearUserForm").onclick = () => {
  document.getElementById("registerForm").reset();
  document.getElementById("regId").value = "";
  document.getElementById("regSubmitBtn").innerText = "Create User";
  document.getElementById("clearUserForm").style.display = "none";
};

window.toggleUserStatus = async (id, currentStatus) => {
  const userRef = doc(db, "users", id);
  if (currentStatus === "Unpaid") {
    const thirtyDays = Date.now() + (30 * 24 * 60 * 60 * 1000);
    await updateDoc(userRef, { status: "Paid", subscriptionExpiresAt: thirtyDays });
    alert("User Activated: 30 Days Granted");
  } else {
    await updateDoc(userRef, { status: "Unpaid", subscriptionExpiresAt: Date.now() - 1000, activeDevices: [] });
    alert("User Expired & Logged Out");
  }
};

window.updateDevs = async (id, val) => {
  await updateDoc(doc(db, "users", id), { devicesAllowed: parseInt(val) || 1 });
};

window.deleteUser = async (id) => {
  if (confirm("Delete this user permanently?")) await deleteDoc(doc(db, "users", id));
};

document.getElementById("registerForm").onsubmit = async (e) => {
  e.preventDefault();
  const id = document.getElementById("regId").value;
  const data = {
    email: document.getElementById("regEmail").value,
    username: document.getElementById("regUsername").value,
    password: document.getElementById("regPassword").value,
    devicesAllowed: parseInt(document.getElementById("regDevices").value)
  };

  if (id) {
    await updateDoc(doc(db, "users", id), data);
    alert("User Updated!");
  } else {
    data.createdAt = Date.now();
    data.status = "Paid";
    data.subscriptionExpiresAt = Date.now() + (30 * 24 * 60 * 60 * 1000);
    data.activeDevices = [];
    await addDoc(usersRef, data);
    alert("User Registered Successfully");
  }
  
  e.target.reset();
  document.getElementById("regId").value = "";
  document.getElementById("regSubmitBtn").innerText = "Create User";
  document.getElementById("clearUserForm").style.display = "none";
};

/* 📺 EPISODE ACTIONS */
window.openEpisodes = (id, title) => {
  currentSeriesId = id;
  document.getElementById("episodesModalTitle").innerText = `Episodes: ${title}`;
  document.getElementById("episodeSeriesId").value = id;
  document.getElementById("episodesModal").style.display = "flex";
  
  if (episodesUnsub) episodesUnsub();
  const epRef = collection(db, "movies", id, "episodes");
  episodesUnsub = onSnapshot(query(epRef, orderBy("epNumber", "asc")), snap => {
    const eps = snap.docs.map(d => ({id: d.id, ...d.data()}));
    document.getElementById("episodesListContainer").innerHTML = eps.map(e => `
      <div class="episode-row">
        <img src="${e.poster || 'img/default-ep.png'}">
        <div style="flex:1">
          S${e.season} E${e.epNumber}: <strong>${e.title}</strong>
        </div>
        <button class="delete" onclick="deleteEpisode('${e.id}')">Del</button>
      </div>
    `).join('');
  });
};

document.getElementById("episodeForm").onsubmit = async (e) => {
  e.preventDefault();
  const season = document.getElementById("newSeasonInput").value || document.getElementById("epSeason").value;
  const epData = {
    season: season,
    epNumber: parseInt(document.getElementById("epNumber").value),
    title: document.getElementById("epTitle").value,
    fileUrl: document.getElementById("epFileUrl").value,
    poster: document.getElementById("epPoster").value,
    description: document.getElementById("epDescription").value,
    updatedAt: Date.now()
  };
  await addDoc(collection(db, "movies", currentSeriesId, "episodes"), epData);
  e.target.reset();
};

window.deleteEpisode = async (epId) => {
  if (confirm("Delete episode?")) await deleteDoc(doc(db, "movies", currentSeriesId, "episodes", epId));
};

/* 🛠 UTILITIES */
window.closeModal = (id) => document.getElementById(id).style.display = "none";

window.toggleSelect = (id) => {
  selectedMovies.has(id) ? selectedMovies.delete(id) : selectedMovies.add(id);
  updateDeleteBtn();
};

window.toggleSelectAll = (el) => {
  if (el.checked) allMovies.forEach(m => selectedMovies.add(m.id));
  else selectedMovies.clear();
  renderMovies(allMovies);
};

function updateDeleteBtn() {
  const btn = document.getElementById("deleteSelectedBtn");
  btn.disabled = selectedMovies.size === 0;
  btn.innerText = `🗑 Delete (${selectedMovies.size})`;
}

window.deleteSelectedMovies = async () => {
  if (!confirm(`Delete ${selectedMovies.size} items?`)) return;
  for (const id of selectedMovies) await deleteDoc(doc(db, "movies", id));
  selectedMovies.clear();
  alert("Deleted!");
};

document.getElementById("searchInput").oninput = (e) => {
  const val = e.target.value.toLowerCase();
  renderMovies(allMovies.filter(m => m.title.toLowerCase().includes(val)));
};
</script>
</body>
</html>
